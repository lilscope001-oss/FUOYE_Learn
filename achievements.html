<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Achievements</title>

<link rel="stylesheet" href="css/style.css">

<style>

.achievement-container{
max-width:900px;
margin:40px auto;
padding:20px;
}

.badges{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.badge-card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.05);
text-align:center;
}

.badge-icon{
font-size:50px;
margin-bottom:10px;
}

.unlocked{
border:3px solid #3FAF7A;
}

.locked{
opacity:.5;
}

</style>

</head>

<body>

<header class="top-nav">
    <a href="index.html" onclick="goBack(event)" class="back-link">← Back</a>
    <ul class="nav-links-inline">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="achievements.html" class="active">Achievements</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="javascript:void(0)" onclick="logout()" class="logout-link">Logout</a></li>
    </ul>
</header>

<div class="achievement-container">

<h1>🏅 Achievements</h1>

<br>

<div class="badges" id="badgesContainer">

</div>

</div>

<script>

const user = JSON.parse(
localStorage.getItem(
"fuoye_current_user"
));

const badges = [

{
name:"Beginner",
xp:100,
icon:"🌱"
},

{
name:"Scholar",
xp:300,
icon:"📚"
},

{
name:"Master Learner",
xp:500,
icon:"🎓"
},

{
name:"Professor",
xp:1000,
icon:"👑"
}

];

const container =
document.getElementById(
"badgesContainer"
);

badges.forEach(badge=>{

const unlocked =
user &&
user.xp >= badge.xp;

container.innerHTML += `

<div class="badge-card ${unlocked ? 'unlocked' : 'locked'}">

<div class="badge-icon">
${badge.icon}
</div>

<h3>${badge.name}</h3>

<p>
Unlock at ${badge.xp} XP
</p>

</div>

`;

});

</script>
<script src="js/navigation.js"></script>

</body>
</html>
