<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | FUOYE Learn</title>

<link rel="stylesheet" href="css/style.css">

<style>

.auth-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#FAF8F2;
}

.auth-card{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.auth-logo{
    text-align:center;
    color:#3FAF7A;
    font-size:30px;
    font-weight:bold;
    margin-bottom:20px;
}

.auth-brand{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    margin-bottom:16px;
}

.auth-brand img{
    max-height:60px;
    width:auto;
}

.auth-title{
    text-align:center;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
}

.form-control{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

.btn-auth{
    width:100%;
    background:#3FAF7A;
    color:#fff;
    border:none;
    padding:14px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.btn-auth:hover{
    background:#2F8E63;
}

.auth-link{
    text-align:center;
    margin-top:15px;
}

.auth-link a{
    color:#3FAF7A;
    text-decoration:none;
}

.error-message{
    color:red;
    margin-bottom:10px;
    text-align:center;
}

</style>

</head>
<body>

<header class="top-nav">
    <a href="index.html" onclick="goBack(event)" class="back-link">← Back</a>
    <ul class="nav-links-inline">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="achievements.html">Achievements</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="profile.html">Profile</a></li>
    </ul>
</header>

<div class="auth-container">

<div class="auth-card">

<div class="auth-logo">
    <div class="auth-brand">
        <img class="nacoss-logo" src="assets/Nacoss Fuoye chapter1 logo-.png" alt="NACOSS FUOYE Logo">
        <img class="fuoye-logo" src="assets/FUOYE_LEARN_HUB_logo.png" alt="FUOYE Learn Logo">
    </div>
    FUOYE Learn
</div>

<h2 class="auth-title">
Login
</h2>

<div id="loginError" class="error-message"></div>

<form id="loginForm">

<div class="form-group">
<label>Email</label>
<input type="email"
id="loginEmail"
class="form-control"
required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password"
id="loginPassword"
class="form-control"
required>
</div>

<button class="btn-auth">
Login
</button>

</form>

<div class="auth-link">
Don't have an account?
<a href="signup.html">Create Account</a>
</div>

</div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
